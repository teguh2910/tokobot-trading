{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-basket"></i> Active Orders</h4>
</div>

<div class="card">
    <div class="card-header"><i class="bi bi-lightning"></i> Active Positions</div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-sm" id="positions-table">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Side</th>
                        <th>Entry Price</th>
                        <th>Qty</th>
                        <th>Stop Loss</th>
                        <th>Take Profit</th>
                        <th>P&L</th>
                        <th>Strategy</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadOrders() {
    const res = await fetch('/api/orders/active');
    const data = await res.json();
    const tbody = document.querySelector('#positions-table tbody');
    tbody.innerHTML = '';
    data.orders.forEach(o => {
        const pnlClass = o.pnl >= 0 ? 'text-success' : 'text-danger';
        tbody.innerHTML += `<tr>
            <td>${o.symbol}</td>
            <td><span class="badge bg-${o.side === 'BUY' ? 'success' : 'danger'}">${o.side}</span></td>
            <td>${o.price.toFixed(4)}</td>
            <td>${o.qty.toFixed(4)}</td>
            <td>${o.stop_loss.toFixed(4)}</td>
            <td>${o.take_profit.toFixed(4)}</td>
            <td class="${pnlClass}">${o.pnl.toFixed(2)}</td>
            <td>${o.strategy}</td>
            <td><button class="btn btn-sm btn-outline-danger" onclick="alert('Cancel via strategy page')">Close</button></td>
        </tr>`;
    });
}
loadOrders();
setInterval(loadOrders, 10000);
</script>
{% endblock %}

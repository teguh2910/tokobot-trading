<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokocrypto Trading Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar d-flex flex-column flex-shrink-0 p-3">
            <a href="/" class="d-flex align-items-center mb-3 text-decoration-none">
                <span class="fs-5 fw-bold"><i class="bi bi-robot"></i> TokoBot</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link" id="nav-dashboard">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="/trades" class="nav-link" id="nav-trades">
                        <i class="bi bi-arrow-left-right"></i> Trades
                    </a>
                </li>
                <li>
                    <a href="/orders" class="nav-link" id="nav-orders">
                        <i class="bi bi-basket"></i> Orders
                    </a>
                </li>
                <li>
                    <a href="/performance" class="nav-link" id="nav-performance">
                        <i class="bi bi-graph-up"></i> Performance
                    </a>
                </li>
                <li>
                    <a href="/strategy" class="nav-link" id="nav-strategy">
                        <i class="bi bi-sliders"></i> Strategy
                    </a>
                </li>
                <li>
                    <a href="/logs" class="nav-link" id="nav-logs">
                        <i class="bi bi-terminal"></i> Logs
                    </a>
                </li>
                <li>
                    <a href="/portfolio" class="nav-link" id="nav-portfolio">
                        <i class="bi bi-wallet2"></i> Portfolio
                    </a>
                </li>
            </ul>
            <hr>
            <div class="text-muted small" id="sidebar-status">
                <i class="bi bi-circle-fill text-success"></i>
                <span id="mode-badge">{{ cfg.BOT_MODE.upper() }}</span>
            </div>
        </nav>

        <main class="main-content flex-grow-1 p-4">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.href === window.location.href) {
                link.classList.add('active');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

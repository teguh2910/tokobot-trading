{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-arrow-left-right"></i> Trade History</h2>
    <div>
        <select class="form-select form-select-sm d-inline-block w-auto" id="filter-symbol">
            <option value="">All Symbols</option>
        </select>
        <select class="form-select form-select-sm d-inline-block w-auto" id="filter-strategy">
            <option value="">All Strategies</option>
            <option value="ma_cross">MA Cross</option>
            <option value="rsi">RSI</option>
            <option value="grid">Grid</option>
        </select>
        <select class="form-select form-select-sm d-inline-block w-auto" id="filter-side">
            <option value="">All Sides</option>
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
        </select>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-sm" id="trades-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Symbol</th>
                        <th>Side</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th>P&L</th>
                        <th>Strategy</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/trades.js"></script>
{% endblock %}

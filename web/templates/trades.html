{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center mb-3 gap-2">
    <h4 class="mb-0"><i class="bi bi-arrow-left-right"></i> Trade History</h4>
    <div class="d-flex flex-wrap gap-1">
        <select class="form-select form-select-sm" id="filter-symbol" style="width:auto;min-width:100px">
            <option value="">All Symbols</option>
        </select>
        <select class="form-select form-select-sm" id="filter-strategy" style="width:auto;min-width:90px">
            <option value="">All Strategies</option>
            <option value="scalp">Scalp</option>
            <option value="exchange">Exchange</option>
        </select>
        <select class="form-select form-select-sm" id="filter-side" style="width:auto;min-width:80px">
            <option value="">All Sides</option>
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
        </select>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-sm" id="trades-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Symbol</th>
                        <th>Side</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th>P&L</th>
                        <th>Strategy</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/trades.js?v=4"></script>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center mb-3 gap-2">
    <h4 class="mb-0"><i class="bi bi-fire"></i> Market Movers</h4>
    <div class="d-flex gap-1">
        <button class="btn btn-sm btn-outline-success active" id="btn-gainers" onclick="showGainers()">Top Gainers</button>
        <button class="btn btn-sm btn-outline-danger" id="btn-losers" onclick="showLosers()">Top Losers</button>
    </div>
</div>

<div class="card mb-4">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-sm" id="trending-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Symbol</th>
                        <th>Price (IDR)</th>
                        <th>24h Change</th>
                        <th>24h High</th>
                        <th>24h Low</th>
                        <th>Volume (Coin)</th>
                        <th>Volume (IDR)</th>
                    </tr>
                </thead>
                <tbody id="trending-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <h5 class="mb-0 me-2"><i class="bi bi-search"></i> Top 10 Screening</h5>
    <button class="btn btn-sm btn-success" onclick="tradeAllBullish()">Trade All Bullish</button>
    <span class="text-muted small" id="selected-count">Selected: 0</span>
</div>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-sm" id="screen-table">
                <thead>
                    <tr>
                        <th style="width:40px">Trade</th>
                        <th>Symbol</th>
                        <th>Price</th>
                        <th>24h Chg</th>
                        <th>RSI (14)</th>
                        <th>MA9</th>
                        <th>MA21</th>
                        <th>Trend</th>
                        <th>Vol Surge</th>
                        <th>Signals</th>
                    </tr>
                </thead>
                <tbody id="screen-body">
                    <tr><td colspan="10" class="text-center text-muted">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const nf = (v, d=2) => Number(v || 0).toLocaleString('id-ID', {minimumFractionDigits:d, maximumFractionDigits:d});
let allCoins = [];
let showGainersMode = true;
let selectedSymbols = new Set();

async function loadTrending() {
    try {
        const res = await fetch('/api/trending');
        const data = await res.json();
        allCoins = data.trending || [];
        renderTable();
    } catch (e) {
        document.getElementById('trending-body').innerHTML =
            '<tr><td colspan="8" class="text-danger text-center">Failed to load data</td></tr>';
    }
}

function renderTable() {
    const sorted = [...allCoins].sort((a, b) =>
        showGainersMode ? b.change_pct - a.change_pct : a.change_pct - b.change_pct
    );
    const top = sorted.slice(0, 50);
    const tbody = document.getElementById('trending-body');
    tbody.innerHTML = top.map((c, i) => {
        const cls = c.change_pct >= 0 ? 'text-success' : 'text-danger';
        const arrow = c.change_pct >= 0 ? '▲' : '▼';
        return `<tr>
            <td class="text-muted">${i + 1}</td>
            <td><strong>${c.symbol}</strong></td>
            <td>${nf(c.price)}</td>
            <td class="${cls} fw-bold">${arrow} ${nf(c.change_pct)}%</td>
            <td>${nf(c.high)}</td>
            <td>${nf(c.low)}</td>
            <td>${nf(c.volume, 0)}</td>
            <td>${nf(c.quote_volume, 0)}</td>
        </tr>`;
    }).join('');
}

async function loadScreen() {
    try {
        const sort = showGainersMode ? 'gainers' : 'losers';
        const res = await fetch('/api/screen?limit=10&sort=' + sort);
        const data = await res.json();
        const items = data.screen || [];
        const tbody = document.getElementById('screen-body');
        if (!items.length) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted">No data</td></tr>';
            return;
        }
        tbody.innerHTML = items.map(c => {
            const chgCls = c.change_pct >= 0 ? 'text-success' : 'text-danger';
            const chgArrow = c.change_pct >= 0 ? '▲' : '▼';
            const rsiCls = c.rsi < 35 ? 'text-success' : c.rsi > 65 ? 'text-danger' : '';
            const trendCls = c.ma_bullish ? 'text-success' : 'text-danger';
            const trendIcon = c.ma_bullish ? '▲' : '▼';
            const volCls = c.vol_surge > 2 ? 'text-warning' : '';
            const canTrade = c.ma_bullish;
            const isSelected = selectedSymbols.has(c.symbol);
            const badges = c.signals.map(s => {
                const cls = s.includes('bullish') || s.includes('oversold') ? 'bg-success' :
                            s.includes('bearish') || s.includes('overbought') ? 'bg-danger' : 'bg-warning';
                return `<span class="badge ${cls} me-1">${s}</span>`;
            }).join('');
            return `<tr class="${isSelected ? 'table-active' : ''}">
                <td>
                    <input type="checkbox" class="form-check-input trade-check" data-symbol="${c.symbol}"
                        ${!canTrade ? 'disabled' : ''} ${isSelected ? 'checked' : ''}
                        onchange="toggleSymbol('${c.symbol}', this.checked)">
                </td>
                <td><strong>${c.symbol}</strong></td>
                <td>${nf(c.price)}</td>
                <td class="${chgCls} fw-bold">${chgArrow} ${nf(c.change_pct)}%</td>
                <td class="${rsiCls} fw-bold">${nf(c.rsi)}</td>
                <td>${nf(c.ma_fast)}</td>
                <td>${nf(c.ma_slow)}</td>
                <td class="${trendCls}">${trendIcon} ${c.ma_bullish ? 'Bullish' : 'Bearish'}</td>
                <td class="${volCls}">${nf(c.vol_surge)}x</td>
                <td>${badges}</td>
            </tr>`;
        }).join('');
        updateSelectedCount();
    } catch (e) {
        document.getElementById('screen-body').innerHTML =
            '<tr><td colspan="10" class="text-danger text-center">Failed to load</td></tr>';
    }
}

async function toggleSymbol(symbol, checked) {
    if (checked) {
        selectedSymbols.add(symbol);
    } else {
        selectedSymbols.delete(symbol);
    }
    await saveSelected();
    updateSelectedCount();
    highlightRows();
}

async function tradeAllBullish() {
    const sort = showGainersMode ? 'gainers' : 'losers';
    const res = await fetch('/api/screen?limit=10&sort=' + sort);
    const data = await res.json();
    (data.screen || []).filter(c => c.ma_bullish).forEach(c => selectedSymbols.add(c.symbol));
    await saveSelected();
    loadScreen();
}

async function saveSelected() {
    await fetch('/api/screen/selected', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({symbols: [...selectedSymbols]})
    });
}

async function loadSelected() {
    try {
        const res = await fetch('/api/screen/selected');
        const data = await res.json();
        (data.symbols || []).forEach(s => selectedSymbols.add(s));
    } catch (e) {}
}

function updateSelectedCount() {
    document.getElementById('selected-count').textContent = 'Selected: ' + selectedSymbols.size;
}

function highlightRows() {
    document.querySelectorAll('.trade-check').forEach(cb => {
        const row = cb.closest('tr');
        if (cb.checked) row.classList.add('table-active');
        else row.classList.remove('table-active');
    });
}

function showGainers() {
    showGainersMode = true;
    document.getElementById('btn-gainers').classList.add('active');
    document.getElementById('btn-losers').classList.remove('active');
    renderTable();
    loadScreen();
}

function showLosers() {
    showGainersMode = false;
    document.getElementById('btn-losers').classList.add('active');
    document.getElementById('btn-gainers').classList.remove('active');
    renderTable();
    loadScreen();
}

loadSelected().then(() => {
    loadTrending();
    loadScreen();
});
setInterval(() => { loadTrending(); loadScreen(); }, 30000);
</script>
{% endblock %}
